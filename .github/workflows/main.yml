name: ProtoBuf
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
      - uses: bufbuild/buf-lint-action@06f9dd823d873146471cfaaf108a993fe00e5325 # v1.1.1
  breaking:
    name: Main branch non-breaking change check
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' }}
    steps:
      - name: Checkout previous commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.before }}
          path: base
      - name: Checkout pushed commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: head
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
      - name: Build base image
        run: buf build base --output "${{ runner.temp }}/base.binpb"
      - name: Check for breaking changes
        run: buf breaking head --against "${{ runner.temp }}/base.binpb"

  breaking-pr:
    name: Pull request breaking change check
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Checkout base branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base
      - name: Checkout PR head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: head
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
      - name: Build base image
        run: buf build base --output "${{ runner.temp }}/base.binpb"
      - name: Check for breaking changes
        run: buf breaking head --against "${{ runner.temp }}/base.binpb"

  generate:
    name: Generated code up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Regenerate code
        run: buf generate

      - name: TypeScript typecheck
        working-directory: gen/ts
        run: |
          bun install --frozen-lockfile
          bun run typecheck

      - name: Verify no changes
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated code is stale. Run 'make gen' and commit the result."
            exit 1
          fi
