name: ProtoBuf
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: bufbuild/buf-setup-action@v1.50.0
      - uses: bufbuild/buf-lint-action@v1.1.1
  breaking:
    name: Main branch non-breaking change check
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' }}
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: bufbuild/buf-setup-action@v1.50.0
      - uses: bufbuild/buf-breaking-action@v1.1.4
        with:
          against: "https://github.com/${GITHUB_REPOSITORY}.git#branch=main,ref=HEAD~1"

  breaking-pr:
    name: Pull request breaking change check
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: bufbuild/buf-setup-action@v1.50.0
      - uses: bufbuild/buf-breaking-action@v1.1.4
        with:
          against: "https://github.com/${GITHUB_REPOSITORY}.git#branch=main,ref=HEAD"

  generate:
    name: Generated code up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: bufbuild/buf-setup-action@v1.50.0
      - uses: oven-sh/setup-bun@v2.2.0

      - name: Regenerate code
        run: buf generate

      - name: TypeScript typecheck
        working-directory: gen/ts
        run: |
          bun install --frozen-lockfile
          bun run typecheck

      - name: Verify no changes
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated code is stale. Run 'make gen' and commit the result."
            exit 1
          fi
